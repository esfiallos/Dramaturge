<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dramaturge · Debug</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg:        #080810;
            --bg-panel:  #0d0d1a;
            --bg-row:    rgba(255,255,255,0.025);
            --border:    rgba(201,168,76,0.15);
            --gold:      #c9a84c;
            --gold-dim:  rgba(201,168,76,0.08);
            --text:      #ede8da;
            --text-muted:rgba(237,232,218,0.45);
            --text-dim:  rgba(237,232,218,0.18);
            --green:     #7ec8a0;
            --red:       #c87e7e;
            --blue:      #7eb8e8;
            --yellow:    #e8d878;
            --font-ui:   'Cinzel', Georgia, serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg); color: var(--text);
            font-family: var(--font-code); font-size: 0.88rem;
        }

        #header {
            height: 52px; display: flex; align-items: center; gap: 1rem;
            padding: 0 1.5rem; background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: var(--font-ui); font-size: 0.82rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); }
        .nav-sep { width: 1px; height: 18px; background: var(--border); }
        .spacer { flex: 1; }
        #connection-badge {
            font-size: 0.65rem; letter-spacing: 0.15em; padding: 0.3rem 0.8rem;
            border-radius: 0; font-family: var(--font-ui);
        }
        .badge-wait { color: var(--text-dim); border: 1px solid var(--border); }
        .badge-live { color: var(--green); border: 1px solid rgba(126,200,160,0.3); background: rgba(126,200,160,0.08); }

        .nav-link {
            font-family: var(--font-ui); font-size: 0.65rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--text-muted); text-decoration: none;
            padding: 0.4rem 0.9rem; border: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-link:hover { color: var(--text); border-color: var(--border); }

        /* ── Layout 3 columnas ─────────────────────────────────────────── */
        #body {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: calc(100vh - 52px);
            gap: 0;
        }

        .col {
            display: flex; flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }
        .col:last-child { border-right: none; }

        .col-header {
            padding: 0.7rem 1.25rem;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            font-family: var(--font-ui); font-size: 0.62rem;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--gold); display: flex; justify-content: space-between; align-items: center;
        }

        .col-body {
            flex: 1; overflow-y: auto; padding: 0.6rem;
        }

        /* Scrollbar */
        .col-body::-webkit-scrollbar { width: 4px; }
        .col-body::-webkit-scrollbar-track { background: transparent; }
        .col-body::-webkit-scrollbar-thumb { background: var(--border); }

        /* ── Instrucciones ─────────────────────────────────────────────── */
        .inst-row {
            display: flex; gap: 0.65rem; align-items: baseline;
            padding: 0.4rem 0.65rem; margin-bottom: 2px;
            border: 1px solid transparent;
            transition: background 0.1s;
            cursor: default;
        }
        .inst-row:hover { background: var(--bg-row); }
        .inst-row.active {
            background: var(--gold-dim);
            border-color: rgba(201,168,76,0.25);
        }

        .inst-idx { color: var(--text-dim); min-width: 30px; text-align: right; flex-shrink: 0; font-size: 0.78rem; }
        .inst-type {
            font-family: var(--font-ui); font-size: 0.65rem;
            letter-spacing: 0.08em; min-width: 130px; flex-shrink: 0;
        }
        .inst-data { color: var(--text-muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; font-size: 0.85rem; }

        /* Type colors */
        .t-dialogue, .t-narrate  { color: var(--green); }
        .t-pawn_load, .t-sprite_show, .t-sprite_hide { color: var(--blue); }
        .t-bg_change, .t-audio   { color: var(--yellow); }
        .t-cond_jump, .t-jump    { color: #e8a87c; }
        .t-puzzle                { color: #d8a0e8; }
        .t-goto                  { color: var(--red); }
        .t-set_flag, .t-inventory_add, .t-inventory_remove { color: var(--text-muted); }
        .t-wait                  { color: var(--text-dim); }

        /* ── Estado ─────────────────────────────────────────────────────── */
        .state-section { margin-bottom: 1rem; }
        .state-label {
            font-family: var(--font-ui); font-size: 0.6rem;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--gold); opacity: 0.7;
            margin-bottom: 0.5rem; padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }
        .state-row {
            display: flex; gap: 0.65rem; padding: 0.35rem 0.65rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .state-key   { color: var(--blue); min-width: 150px; }
        .state-value { color: var(--green); }
        .state-empty { color: var(--text-dim); padding: 0.6rem; font-style: italic; font-size: 0.82rem; }

        .inv-tag {
            display: inline-block; padding: 0.2rem 0.65rem; margin: 0.2rem;
            border: 1px solid rgba(126,200,160,0.25); background: rgba(126,200,160,0.07);
            color: var(--green);
        }

        /* ── Log ──────────────────────────────────────────────────────────── */
        .log-entry {
            padding: 0.4rem 0.65rem; margin-bottom: 1px;
            border-left: 2px solid transparent;
        }
        .log-entry.step   { border-left-color: var(--gold); }
        .log-entry.parsed { border-left-color: var(--blue); }
        .log-entry.error  { border-left-color: var(--red); color: var(--red); }
        .log-entry.info   { border-left-color: var(--text-dim); }

        .log-time  { color: var(--text-dim); margin-right: 0.6rem; }
        .log-label {
            font-family: var(--font-ui); font-size: 0.6rem;
            letter-spacing: 0.12em; margin-right: 0.6rem;
        }
        .log-msg { color: var(--text-muted); }

        .no-signal {
            display: flex; height: 100%; justify-content: center; align-items: center;
            flex-direction: column; gap: 0.5rem;
            color: var(--text-dim); font-family: var(--font-ui);
            font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
        }
        .no-signal span { opacity: 0.5; }

        #clear-log {
            font-family: var(--font-ui); font-size: 0.5rem; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--text-dim);
            background: transparent; border: none; cursor: pointer;
            transition: color 0.15s;
        }
        #clear-log:hover { color: var(--text-muted); }
    </style>
</head>
<body>

<div id="header">
    <span class="logo">Dramaturge</span>
    <div class="nav-sep"></div>
    <span id="connection-badge" class="badge-wait">Sin señal</span>
    <div class="spacer"></div>
    <a class="nav-link" href="/dev/editor.html">Editor</a>
    <a class="nav-link" href="/dev/characters.html" target="_blank">Personajes</a>
</div>

<div id="body">

    <!-- COL 1: Instrucciones parseadas -->
    <div class="col">
        <div class="col-header">
            <span>Instrucciones</span>
            <span id="inst-count" style="color:var(--text-dim)">— inst.</span>
        </div>
        <div class="col-body" id="inst-list">
            <div class="no-signal"><span>Esperando canvas...</span></div>
        </div>
    </div>

    <!-- COL 2: Estado del juego -->
    <div class="col">
        <div class="col-header">Estado</div>
        <div class="col-body" id="state-view">
            <div class="no-signal"><span>Esperando canvas...</span></div>
        </div>
    </div>

    <!-- COL 3: Log de eventos -->
    <div class="col">
        <div class="col-header">
            <span>Eventos</span>
            <button id="clear-log">Limpiar</button>
        </div>
        <div class="col-body" id="event-log">
            <div class="no-signal"><span>Esperando canvas...</span></div>
        </div>
    </div>

</div>

<script type="module" src="./debug.js"></script>
</body>
</html>
