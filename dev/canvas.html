<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dramaturge · Canvas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #030305; }

        /* Importar design system del engine */
        /* (las variables CSS se redeclaran aquí para no depender del src/style.css de producción) */
        :root {
            --void:         #030305;
            --bg-panel:     rgba(7,7,13,0.97);
            --gold:         #c9a84c;
            --gold-bright:  #e2c47a;
            --gold-dim:     rgba(201,168,76,0.1);
            --gold-line:    rgba(201,168,76,0.28);
            --text-primary: #ede8da;
            --text-muted:   rgba(237,232,218,0.45);
            --text-dim:     rgba(237,232,218,0.18);
            --font-display: 'Cinzel', Georgia, serif;
            --font-body:    'Crimson Pro', Georgia, serif;
        }

        /* ── Mini HUD del canvas ─────────────────────────────────────────── */
        #canvas-hud {
            position: fixed; top: 0; left: 0; right: 0;
            height: 44px;
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0 1.25rem;
            background: rgba(3,3,5,0.92);
            border-bottom: 1px solid rgba(201,168,76,0.15);
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .hud-label {
            font-family: var(--font-display); font-size: 0.65rem;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--gold); opacity: 0.7;
        }

        #hud-filename {
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            color: var(--text-muted);
        }

        .spacer { flex: 1; }

        .hud-btn {
            font-family: var(--font-display); font-size: 0.6rem;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--gold); background: transparent;
            border: 1px solid rgba(201,168,76,0.2);
            padding: 0.32rem 0.85rem; cursor: pointer;
            transition: background 0.15s; text-decoration: none;
            display: inline-flex; align-items: center;
        }
        .hud-btn:hover { background: rgba(201,168,76,0.1); }
        .hud-btn--close { color: rgba(200,80,80,0.8); border-color: rgba(200,80,80,0.2); }
        .hud-btn--close:hover { background: rgba(200,80,80,0.12); }

        #hud-step {
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* ── Viewport ────────────────────────────────────────────────────── */
        #viewport {
            position: fixed; inset: 44px 0 0 0;
        }

        /* Reutilizar las clases del engine (copiadas de style.css) */
        #click-zone {
            position: absolute; inset: 0;
            z-index: 30;
            display: flex; align-items: flex-end;
            cursor: pointer;
        }
        #text-box {
            width: 100%;
            padding: 2.5rem 10% 3rem;
            background: linear-gradient(to top, rgba(3,3,5,0.98) 0%, rgba(3,3,5,0.78) 65%, transparent 100%);
            border-top: 1px solid var(--gold-line);
            transition: all 0.5s ease;
            min-height: 32%;
        }
        #text-box.narration-mode {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 8% 15%;
            background: rgba(3,3,5,0.92);
            border-top: none; min-height: unset;
        }
        #char-name {
            font-family: var(--font-display); font-size: 1rem; font-weight: 600;
            letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--gold); margin-bottom: 0.75rem;
        }
        #text-box.narration-mode #char-name { display: none; }
        #char-text {
            font-family: var(--font-body); font-size: 1.5rem;
            line-height: 1.65; color: var(--text-primary); font-weight: 300;
        }
        #text-box.narration-mode #char-text {
            font-style: italic; font-size: 1.85rem; line-height: 1.7;
            max-width: 800px; text-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        #puzzle-overlay {
            position: absolute; inset: 0; z-index: 40;
            background: rgba(3,3,5,0.96);
            display: flex; align-items: center; justify-content: center;
            padding: 2rem; opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #puzzle-overlay.active { opacity: 1; pointer-events: all; }
        #puzzle-card {
            width: 100%; max-width: 520px;
            border: 1px solid var(--gold-line); padding: 2.5rem;
            background: var(--bg-panel); position: relative;
        }
        #puzzle-card::before {
            content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        #puzzle-title {
            font-family: var(--font-display); font-size: 0.82rem;
            letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold);
            margin-bottom: 1.25rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--gold-line);
        }
        #puzzle-desc {
            font-family: var(--font-body); font-size: 1.2rem; line-height: 1.65;
            color: var(--text-primary); font-style: italic; margin-bottom: 1.75rem;
        }
        #puzzle-interaction { display: flex; flex-direction: column; gap: 0.55rem; }
        .puzzle-btn {
            font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--text-primary); background: transparent;
            border: 1px solid rgba(237,232,218,0.14); padding: 0.85rem 1.25rem;
            text-align: left; cursor: pointer;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }
        .puzzle-btn:hover { border-color: var(--gold-line); background: var(--gold-dim); color: var(--gold); }
        .puzzle-btn--confirm, .puzzle-btn--continue {
            text-align: center; border-color: var(--gold-line); color: var(--gold); margin-top: 0.5rem;
        }
        .puzzle-btn--confirm:hover, .puzzle-btn--continue:hover {
            background: var(--gold); color: var(--void); border-color: var(--gold);
        }
        .puzzle-input {
            width: 100%; padding: 0.9rem 1rem;
            background: rgba(255,255,255,0.03); border: 1px solid var(--gold-line);
            color: var(--text-primary); font-family: var(--font-body);
            font-size: 1.1rem; outline: none; caret-color: var(--gold);
        }
        .puzzle-input:focus { border-color: var(--gold); }
        .puzzle-result {
            display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem;
            font-family: var(--font-display); font-size: 0.72rem;
            letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.5rem;
        }
        .puzzle-result--pass { border: 1px solid rgba(120,190,130,0.3); background: rgba(120,190,130,0.07); color: #78be82; }
        .puzzle-result--fail { border: 1px solid rgba(190,90,90,0.3); background: rgba(190,90,90,0.07); color: #be5a5a; }

        /* ── Indicador de avance ─────────────────────────────────────────── */
        #advance-indicator {
            position: absolute; bottom: 1.6rem; right: 10%;
            font-size: 0.7rem; color: var(--gold);
            opacity: 0; transform: translateY(-3px);
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        #advance-indicator.visible {
            opacity: 1;
            animation: advance-pulse 0.9s ease-in-out infinite;
        }
        @keyframes advance-pulse {
            0%, 100% { transform: translateY(-3px); opacity: 0.5; }
            50%       { transform: translateY(2px);  opacity: 1;   }
        }
        #text-box.narration-mode #advance-indicator {
            right: 50%; bottom: 2.5rem;
            transform: translateX(50%) translateY(-3px);
        }
        #text-box.narration-mode #advance-indicator.visible {
            animation: advance-pulse-narration 0.9s ease-in-out infinite;
        }
        @keyframes advance-pulse-narration {
            0%, 100% { transform: translateX(50%) translateY(-3px); opacity: 0.5; }
            50%       { transform: translateX(50%) translateY(2px);  opacity: 1;   }
        }
        #text-box.click-flash { animation: click-flash 0.12s ease-out; }
        @keyframes click-flash {
            0%   { background-color: inherit; }
            40%  { background-color: rgba(201,168,76,0.06); }
            100% { background-color: inherit; }
        }

        /* Error splash si no hay script */
        #no-script {
            display: none;
            position: fixed; inset: 36px 0 0;
            justify-content: center; align-items: center; flex-direction: column; gap: 1rem;
            font-family: var(--font-display); color: rgba(237,232,218,0.3);
            font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase;
        }
        #no-script a {
            color: var(--gold); text-decoration: none;
            border-bottom: 1px solid rgba(201,168,76,0.3);
        }
    </style>
</head>
<body>

    <div id="canvas-hud">
        <span class="hud-label">Dramaturge · Canvas</span>
        <span id="hud-filename">—</span>
        <div class="spacer"></div>
        <span id="hud-step">— / —</span>
        <button class="hud-btn" id="btn-reset-canvas">↺ Reset</button>
        <a class="hud-btn" href="/dev/debug.html" target="_blank">Debug</a>
        <button class="hud-btn hud-btn--close" id="btn-close">✕ Cerrar</button>
    </div>

    <div id="viewport">
        <div id="puzzle-overlay">
            <div id="puzzle-card">
                <div id="puzzle-title"></div>
                <div id="puzzle-desc"></div>
                <div id="puzzle-interaction"></div>
            </div>
        </div>
        <div id="scene-transition" style="position:absolute;inset:0;z-index:25;pointer-events:none;opacity:0;background:#000;"></div>
        <div id="click-zone">
            <div id="text-box">
                <div id="char-name"></div>
                <p id="char-text">Cargando script...</p>
            </div>
        </div>
    </div>

    <div id="no-script">
        <span>No hay script cargado.</span>
        <a href="/dev/editor.html">Volver al editor</a>
    </div>

    <script type="module" src="./canvas.js"></script>
</body>
</html>
