<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dramaturge · Personajes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg:          #080810;
            --bg-panel:    #0d0d1a;
            --border:      rgba(201,168,76,0.15);
            --gold:        #c9a84c;
            --gold-bright: #e2c47a;
            --gold-dim:    rgba(201,168,76,0.08);
            --text:        #ede8da;
            --text-muted:  rgba(237,232,218,0.45);
            --text-dim:    rgba(237,232,218,0.18);
            --green:       #7ec8a0;
            --red:         #c87e7e;
            --font-ui:     'Cinzel', Georgia, serif;
            --font-code:   'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; min-height: 100%;
            background: var(--bg); color: var(--text);
            font-family: var(--font-code); font-size: 0.9rem;
        }

        /* ── Header ─────────────────────────────────────────────────────── */
        #header {
            height: 52px; display: flex; align-items: center; gap: 1rem;
            padding: 0 1.5rem; background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: var(--font-ui); font-size: 0.82rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); }
        .nav-sep { width: 1px; height: 18px; background: var(--border); }
        .page-title { font-family: var(--font-ui); font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); }
        .spacer { flex: 1; }
        .nav-link {
            font-family: var(--font-ui); font-size: 0.65rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--text-muted); text-decoration: none;
            padding: 0.4rem 0.9rem; border: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-link:hover { color: var(--text); border-color: var(--border); }

        /* ── Main content ───────────────────────────────────────────────── */
        #main {
            max-width: 820px; margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ── Toolbar ────────────────────────────────────────────────────── */
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .char-count {
            font-family: var(--font-ui); font-size: 0.6rem;
            letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold);
        }

        /* ── Buttons ────────────────────────────────────────────────────── */
        .btn {
            font-family: var(--font-ui); font-size: 0.65rem;
            letter-spacing: 0.18em; text-transform: uppercase;
            background: transparent; cursor: pointer;
            padding: 0.45rem 1rem;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .btn-outline { color: var(--text-muted); border: 1px solid var(--border); }
        .btn-outline:hover { color: var(--text); border-color: rgba(237,232,218,0.3); }
        .btn-primary { color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
        .btn-primary:hover { background: var(--gold-dim); border-color: var(--gold); }
        .btn-danger { color: var(--red); border: 1px solid rgba(200,80,80,0.2); }
        .btn-danger:hover { background: rgba(200,80,80,0.08); border-color: rgba(200,80,80,0.5); }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.5rem; }

        /* ── Character cards ────────────────────────────────────────────── */
        #char-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .char-card {
            border: 1px solid var(--border);
            background: rgba(13,13,26,0.8);
            transition: border-color 0.2s;
        }
        .char-card:hover { border-color: rgba(201,168,76,0.3); }

        .card-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 1rem 1.25rem 0.75rem;
        }
        .card-identity { display: flex; align-items: baseline; gap: 0.65rem; }
        .char-name { font-family: var(--font-ui); font-size: 1.1rem; color: var(--gold); }
        .char-id { color: var(--text-dim); font-size: 0.82rem; }
        .card-actions { display: flex; gap: 0.4rem; }

        .card-meta {
            display: flex; gap: 2rem; flex-wrap: wrap;
            padding: 0 1.25rem 0.85rem;
            font-size: 0.82rem; color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .meta-item { display: flex; gap: 0.5rem; align-items: center; }
        .meta-label { color: var(--text-dim); font-size: 0.72rem; }

        .card-poses {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            padding: 0.75rem 1.25rem 1rem;
        }
        .pose-tag {
            display: inline-flex; align-items: center; gap: 0.6rem;
            padding: 0.25rem 0.75rem;
            border: 1px solid rgba(126,200,160,0.2); background: rgba(126,200,160,0.06);
            font-size: 0.82rem;
        }
        .pose-alias { color: var(--green); }
        .pose-file  { color: var(--text-dim); font-size: 0.75rem; }
        .no-poses   { color: var(--text-dim); font-style: italic; padding: 0.2rem 0.5rem; }

        /* ── Confirm inline ─────────────────────────────────────────────── */
        .confirm-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1.25rem; gap: 1rem;
            background: rgba(200,80,80,0.06);
            border-top: 1px solid rgba(200,80,80,0.15);
            font-size: 0.8rem; color: var(--text-muted);
        }
        .confirm-bar strong { color: var(--red); }
        .confirm-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

        /* ── Empty state ────────────────────────────────────────────────── */
        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--text-dim); font-family: var(--font-ui);
            font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
        }

        /* ── Form panel ─────────────────────────────────────────────────── */
        #form-panel {
            display: none;
            position: fixed; inset: 0; z-index: 200;
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(6px);
            justify-content: center; align-items: flex-start;
            padding: 80px 1rem 2rem;
            overflow-y: auto;
        }
        #form-panel.open { display: flex; }

        .form-card {
            width: 100%; max-width: 560px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
        }
        .form-card::before {
            content: ''; display: block; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .form-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
        }
        .form-title {
            font-family: var(--font-ui); font-size: 0.7rem;
            letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold);
        }

        .form-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }

        .field { display: flex; flex-direction: column; gap: 0.35rem; }
        .field-label {
            font-family: var(--font-ui); font-size: 0.65rem;
            letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold);
            display: flex; gap: 0.5rem; align-items: baseline;
        }
        .field-hint {
            font-family: var(--font-code); font-size: 0.68rem;
            letter-spacing: 0; text-transform: none;
            color: var(--text-dim); font-weight: 400;
        }
        .field-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(237,232,218,0.1);
            color: var(--text); font-family: var(--font-code); font-size: 0.92rem;
            padding: 0.65rem 0.9rem; outline: none; caret-color: var(--gold);
            transition: border-color 0.15s; width: 100%;
        }
        .field-input:focus { border-color: rgba(201,168,76,0.4); }
        .field-input:disabled { opacity: 0.35; cursor: not-allowed; }
        .field-textarea { resize: vertical; min-height: 130px; }

        .form-error {
            color: var(--red); font-size: 0.78rem;
            min-height: 1.2rem; padding: 0 0.25rem;
        }

        .form-footer {
            display: flex; justify-content: flex-end; gap: 0.5rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div id="header">
    <span class="logo">Dramaturge</span>
    <div class="nav-sep"></div>
    <span class="page-title">Personajes</span>
    <div class="spacer"></div>
    <a class="nav-link" href="/dev/editor.html">Editor</a>
    <a class="nav-link" href="/dev/debug.html" target="_blank">Debug</a>
</div>

<div id="main">
    <div class="toolbar">
        <span class="char-count" id="char-count">Cargando...</span>
        <div style="display:flex;gap:0.5rem">
            <button class="btn btn-outline" id="btn-log-all" title="Imprime todos los personajes en la consola del navegador">⌘ Log en consola</button>
            <button class="btn btn-primary" id="btn-new">+ Nuevo personaje</button>
        </div>
    </div>
    <div id="char-list"></div>
</div>

<!-- Form modal -->
<div id="form-panel">
    <div class="form-card">
        <div class="form-header">
            <span class="form-title" id="form-title">Nuevo personaje</span>
            <button class="btn btn-outline btn-sm" id="btn-form-close">✕ Cerrar</button>
        </div>
        <div class="form-body">
            <div class="field">
                <label class="field-label" for="f-id">
                    ID interno
                    <span class="field-hint">snake_case, sin espacios · Ej: valeria</span>
                </label>
                <input class="field-input" id="f-id" type="text" placeholder="valeria">
            </div>
            <div class="field">
                <label class="field-label" for="f-name">
                    Nombre mostrado
                    <span class="field-hint">Aparece en los diálogos · Ej: Valeria</span>
                </label>
                <input class="field-input" id="f-name" type="text" placeholder="Valeria">
            </div>
            <div class="field">
                <label class="field-label" for="f-basepath">
                    basePath
                    <span class="field-hint">Carpeta de sprites · Ej: /assets/sprites/v/</span>
                </label>
                <input class="field-input" id="f-basepath" type="text" placeholder="/assets/sprites/v/">
            </div>
            <div class="field">
                <label class="field-label" for="f-voice">
                    voicePrefix
                    <span class="field-hint">Prefijo de archivos de voz · Ej: VAL_</span>
                </label>
                <input class="field-input" id="f-voice" type="text" placeholder="VAL_">
            </div>
            <div class="field">
                <label class="field-label" for="f-poses">
                    Poses
                    <span class="field-hint">Una por línea · formato: alias: archivo.png</span>
                </label>
                <textarea class="field-input field-textarea" id="f-poses"
                    placeholder="neutral: v_idle.png&#10;triste: v_sad.png&#10;sorpresa: v_surprised.png"></textarea>
            </div>
            <div class="form-error" id="form-error"></div>
        </div>
        <div class="form-footer">
            <button class="btn btn-outline" id="btn-form-cancel">Cancelar</button>
            <button class="btn btn-primary" id="btn-form-save">Guardar</button>
        </div>
    </div>
</div>

<script type="module" src="./characters.js"></script>
</body>
</html>
